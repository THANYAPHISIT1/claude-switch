name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package and compute SHA256
        run: |
          ARTIFACT=claude-switch-${{ matrix.target }}
          tar czf ${ARTIFACT}.tar.gz -C target/${{ matrix.target }}/release claude-switch
          shasum -a 256 ${ARTIFACT}.tar.gz | awk '{print $1}' > ${ARTIFACT}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            claude-switch-${{ matrix.target }}.tar.gz
            claude-switch-${{ matrix.target }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Homebrew formula
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARM_SHA=$(cat artifacts/claude-switch-aarch64-apple-darwin.sha256)
          INTEL_SHA=$(cat artifacts/claude-switch-x86_64-apple-darwin.sha256)

          cat > claude-switch.rb << EOF
          class ClaudeSwitch < Formula
            desc "A blazingly fast profile manager for Claude Code"
            homepage "https://github.com/THANYAPHISIT1/claude-switch"
            license "MIT"
            version "${VERSION}"

            on_arm do
              url "https://github.com/THANYAPHISIT1/claude-switch/releases/download/v${VERSION}/claude-switch-aarch64-apple-darwin.tar.gz"
              sha256 "${ARM_SHA}"
            end

            on_intel do
              url "https://github.com/THANYAPHISIT1/claude-switch/releases/download/v${VERSION}/claude-switch-x86_64-apple-darwin.tar.gz"
              sha256 "${INTEL_SHA}"
            end

            def install
              bin.install "claude-switch"
            end

            test do
              assert_match "Error", shell_output("#{bin}/claude-switch work 2>&1", 1)
            end
          end
          EOF

          CONTENT=$(base64 -w 0 claude-switch.rb)
          FILE_SHA=$(curl -s \
            -H "Authorization: token ${TAP_GITHUB_TOKEN}" \
            "https://api.github.com/repos/THANYAPHISIT1/homebrew-tap/contents/claude-switch.rb" \
            | jq -r '.sha')

          curl -s -X PUT \
            -H "Authorization: token ${TAP_GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/THANYAPHISIT1/homebrew-tap/contents/claude-switch.rb" \
            -d "{\"message\": \"chore: update claude-switch to v${VERSION}\", \"content\": \"${CONTENT}\", \"sha\": \"${FILE_SHA}\"}"
